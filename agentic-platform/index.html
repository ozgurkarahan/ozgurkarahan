<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Agentic Platform — our vision</title>
<meta name="description" content="Our agentic-platform vision to date — build, deploy and operate agents at scale, informed by Microsoft Build 2026." />
<meta property="og:title" content="The Agentic Platform — our vision" />
<meta property="og:description" content="Build, deploy and operate agents at scale — our agentic-platform vision to date, informed by Microsoft Build 2026." />
<meta property="og:type" content="website" />
<style>
  :root{--bg:#0b1020;--chip:#1b2433;--chip-on:#0F6CBD;--txt:#9fb0c9;--txt-on:#fff;--line:#26324a}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}
  .stage{position:fixed;inset:0 0 52px 0;display:flex;align-items:center;justify-content:center;padding:16px}
  .frame{width:min(100%,calc((100vh - 84px) * 16 / 9));aspect-ratio:16/9;border:0;border-radius:10px;
    box-shadow:0 24px 60px rgba(0,0,0,.5);background:#fff}
  .bar{position:fixed;left:0;right:0;bottom:0;height:52px;display:flex;align-items:center;gap:14px;
    padding:0 18px;background:#0c1118;border-top:1px solid var(--line)}
  .bar button{background:var(--chip);color:var(--txt-on);border:0;border-radius:7px;width:34px;height:32px;
    font-size:15px;cursor:pointer}
  .bar button:disabled{opacity:.35;cursor:default}
  .dots{display:flex;gap:6px;margin-left:4px}
  .dot{width:22px;height:22px;border-radius:6px;background:var(--chip);color:var(--txt);border:0;
    font-size:11px;cursor:pointer;font-variant-numeric:tabular-nums}
  .dot.on{background:var(--chip-on);color:#fff}
  .sp{flex:1}
  .meta{color:var(--txt);font-size:12px;letter-spacing:.08em;font-family:ui-monospace,"SFMono-Regular",Consolas,monospace}
  .meta b{color:#fff}
  .fs{background:var(--chip);color:var(--txt-on);border:0;border-radius:7px;height:32px;padding:0 12px;cursor:pointer;font-size:12px}
</style>
</head>
<body>
  <div class="stage"><iframe id="f" class="frame" title="slide"></iframe></div>
  <div class="bar">
    <button id="prev" title="Previous (←)">◀</button>
    <button id="next" title="Next (→)">▶</button>
    <div class="dots" id="dots"></div>
    <div class="sp"></div>
    <span class="meta">AGENTIC PLATFORM · <b id="c"></b></span>
    <button class="fs" id="fs" title="Fullscreen (F)">⛶ Fullscreen</button>
  </div>
<script>
  const N = 8;
  const slides = Array.from({length:N}, (_,k)=>`slides/slide_${String(k+1).padStart(2,'0')}.html`);
  const titles = ["Vision","Strategy","Lifecycle","Ops","Build","Deploy & Host","Operate","Resources"];
  let i = 0;
  const f=document.getElementById('f'), c=document.getElementById('c'), dots=document.getElementById('dots');
  function render(){
    f.src=slides[i];
    c.textContent=(i+1)+' / '+N+' · '+titles[i];
    document.getElementById('prev').disabled=i===0;
    document.getElementById('next').disabled=i===N-1;
    [...dots.children].forEach((d,k)=>d.className='dot'+(k===i?' on':''));
    if(location.hash!=='#'+(i+1)) history.replaceState(null,'','#'+(i+1));
  }
  function go(n){i=Math.max(0,Math.min(N-1,n));render();}
  slides.forEach((_,k)=>{const b=document.createElement('button');b.className='dot';b.textContent=k+1;b.onclick=()=>go(k);dots.appendChild(b);});
  document.getElementById('prev').onclick=()=>go(i-1);
  document.getElementById('next').onclick=()=>go(i+1);
  document.getElementById('fs').onclick=()=>{const s=document.querySelector('.stage');document.fullscreenElement?document.exitFullscreen():s.requestFullscreen&&s.requestFullscreen();};
  addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ')go(i+1);
    if(e.key==='ArrowLeft'||e.key==='PageUp')go(i-1);
    if(e.key==='Home')go(0); if(e.key==='End')go(N-1);
    if(e.key==='f'||e.key==='F')document.getElementById('fs').click();
  });
  const start=parseInt((location.hash||'').replace('#',''),10);
  go(Number.isFinite(start)&&start>=1&&start<=N?start-1:0);
</script>
</body>
</html>
